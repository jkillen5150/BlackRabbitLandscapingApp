<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Dashboard - Black Rabbit</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.10.0/dist/leaflet.css" integrity="sha256-o9N1j7kV+uLr3glU6pGSH3fZ2B1u0jtTwFVY3j8D+hM=" crossorigin="" />
    <style>
        body { font-family: 'Montserrat', sans-serif; margin: 0; min-height: 100vh; background: #f2f2ef; color: #2c3e50; }
        header { padding: 24px 28px 0; max-width: 1180px; margin: 0 auto; }
        h1 { margin: 0; font-size: clamp(2rem, 4vw, 3rem); color: #1f3d25; }
        p.subtitle { margin: 12px 0 0; color: #555; max-width: 720px; }
        #app { display: grid; grid-template-columns: 1fr 420px; gap: 24px; max-width: 1180px; margin: 24px auto 40px; padding: 0 20px; }
        #map { min-height: 520px; border-radius: 24px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.12); }
        .sidebar { display: flex; flex-direction: column; gap: 18px; }
        .card { background: #ffffff; border-radius: 22px; padding: 20px; box-shadow: 0 16px 34px rgba(0,0,0,0.08); }
        .card h2 { margin: 0 0 10px; font-size: 1.4rem; }
        .job-card { border-radius: 18px; padding: 18px; background: #fdfdf9; box-shadow: inset 0 0 0 1px rgba(34,34,34,0.04); }
        .job-card + .job-card { margin-top: 16px; }
        .job-card h3 { margin: 0 0 8px; font-size: 1.15rem; color: #213b24; }
        .job-card p { margin: 3px 0; color: #4d5c4e; line-height: 1.55; }
        .job-card button { margin-top: 14px; border: none; border-radius: 999px; padding: 12px 18px; background: #2e6d34; color: #fff; cursor: pointer; font-size: 0.96rem; transition: transform 150ms ease, box-shadow 150ms ease; }
        .job-card button:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(46,109,52,0.16); }
        .empty-state { text-align: center; color: #6b6b6b; padding: 32px 0; }
        @media (max-width: 980px) { #app { grid-template-columns: 1fr; } .sidebar { order: -1; } }
        @media (max-width: 640px) { body { padding: 0; } header { padding: 18px 16px 0; } #app { margin: 16px auto; padding: 0 12px; } }
    </style>
</head>
<body>
    <header>
        <h1>Provider Dashboard</h1>
        <p class="subtitle">View local work with a map-first interface, accept jobs in one tap, and help good people get the job done.</p>
    </header>

    <div id="app">
        <div id="map"></div>
        <div class="sidebar">
            <div class="card">
                <h2>Available jobs</h2>
                <div id="jobs-list"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.10.0/dist/leaflet.js" integrity="sha256-c+ZQYscE/AY7HPTcTiXovxcBHt0E9yh7L1d60vC7gYw=" crossorigin=""></script>
    <script>
        const apiBase = window.location.origin;
        const defaultCenter = [39.8283, -98.5795];
        let map;
        let markerLayer;

        function initMap(center = defaultCenter) {
            if (!map) {
                map = L.map('map').setView(center, 5);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 18,
                    attribution: '&copy; OpenStreetMap contributors',
                }).addTo(map);
                markerLayer = L.layerGroup().addTo(map);
            } else {
                map.setView(center, 12);
                markerLayer.clearLayers();
            }
        }

        function renderJobs(jobs) {
            const container = document.getElementById('jobs-list');
            if (!jobs.length) {
                container.innerHTML = '<div class="empty-state"><strong>No open jobs available.</strong><br>Check back soon for fresh local work.</div>';
                return;
            }

            container.innerHTML = jobs.map(job => `
                <div class="job-card">
                    <h3>${job.title}</h3>
                    <p><strong>Urgency:</strong> ${job.urgency}</p>
                    <p>${job.description}</p>
                    <p><strong>Address:</strong> ${job.address}</p>
                    <button onclick="acceptJob(${job.id})">Accept Job</button>
                </div>
            `).join('');
        }

        function addMapMarkers(jobs) {
            markerLayer.clearLayers();
            jobs.forEach(job => {
                if (job.latitude && job.longitude) {
                    const marker = L.marker([job.latitude, job.longitude]);
                    marker.bindPopup(`<strong>${job.title}</strong><br>${job.address}`);
                    marker.addTo(markerLayer);
                }
            });
        }

        async function loadJobs() {
            const res = await fetch(`${apiBase}/jobs/open/`);
            const jobs = await res.json();
            renderJobs(jobs);
            if (jobs.length && jobs[0].latitude && jobs[0].longitude) {
                initMap([jobs[0].latitude, jobs[0].longitude]);
            } else {
                initMap();
            }
            addMapMarkers(jobs);
        }

        async function acceptJob(jobId) {
            await fetch(`${apiBase}/jobs/${jobId}/status/?status=assigned`, { method: 'PUT' });
            alert('Job accepted!');
            loadJobs();
        }

        loadJobs();
    </script>
</body>
</html>
