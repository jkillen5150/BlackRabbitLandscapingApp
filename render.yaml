services:
  - type: web
    name: black-rabbit-api
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api
    envVars:
      - key: EMAIL_DEMO_MODE
        value: "true"
      - key: FRONTEND_URL
        value: https://black-rabbit-api.onrender.com
      - key: DATABASE_URL
        value: sqlite:///./blackrabbit.db
