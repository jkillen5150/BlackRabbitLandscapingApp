# Auto-deploys from GitHub when connected to Render
# API: https://black-rabbit-api.onrender.com
# Web: add static site "black-rabbit-web" (or use Vercel for site/)

services:
  - type: web
    name: black-rabbit-api
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: EMAIL_DEMO_MODE
        value: "true"
      - key: FRONTEND_URL
        value: https://brapp.vercel.app
      - key: DATABASE_URL
        value: sqlite:///./blackrabbit.db

  - type: web
    name: black-rabbit-web
    runtime: static
    rootDir: site
    plan: free
    buildCommand: "true"
    staticPublishPath: .
    headers:
      - path: /sw.js
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
