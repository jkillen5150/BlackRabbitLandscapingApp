# One-click: https://render.com/deploy?repo=https://github.com/jkillen5150/BlackRabbitLandscapingApp
# Free web services sleep after idle; first request may be slow. No persistent disk on free.

services:
  - type: web
    name: black-rabbit-api
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: XAI_API_KEY
        sync: false
      - key: XAI_CHAT_MODEL
        value: grok-4.5
      - key: EMAIL_DEMO_MODE
        value: "true"
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./blackrabbit.db
